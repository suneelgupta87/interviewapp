<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>.NET Interview Portal</title>

<style>
body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f7fb;
            /* padding:20px; */
        }

        .card{
            max-width:900px;
            margin:auto;
            background:#fff;
            padding:25px;
            border-radius:8px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        /* h2{
            color:#0d6efd;
            border-bottom:2px solid #0d6efd;
            padding-bottom:10px;
        } */

        p{
            font-size:18px;
            line-height:1.8;
            color:#333;
        }

        ul{
            line-height:1.8;
        }

        li{
            margin-bottom:12px;
            font-size:18px;
        }

        code{
            background:#eef2f7;
            padding:2px 6px;
            border-radius:4px;
            color:#d63384;
            font-weight:bold;
            font-size:14px;
        }

        .highlight{
            background:#e8f4ff;
            padding:15px;
            border-left:5px solid #0d6efd;
            margin-top:20px;
            border-radius:5px;
        }
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:250px;
background:#1f2937;
color:white;
padding:5px;
overflow:auto;
transition:width .2s ease;
}

.sidebar-header{
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
padding:6px 4px 10px;
}

.sidebar-title{
font-size:18px;
font-weight:bold;
}

.sidebar-toggle{
background:#374151;
color:white;
border:1px solid #4b5563;
border-radius:4px;
padding:6px 8px;
cursor:pointer;
}

.sidebar-toggle:hover{
background:#4b5563;
}

.sidebar h2{
margin-bottom:5px;
}

.topic{
padding:10px;
margin-bottom:5px;
background:#374151;
cursor:pointer;
border-radius:5px;
}

.topic:hover{
background:#4b5563;
}

.topic.active{
background:#2563eb;
font-weight:bold;
}

body.sidebar-collapsed .sidebar{
width:70px;
padding:8px 6px;
}

body.sidebar-collapsed .sidebar-title{
display:none;
}

body.sidebar-collapsed .topic{
font-size:0;
padding:10px 6px;
text-align:center;
}

body.sidebar-collapsed .sidebar-toggle{
margin-left:auto;
}

.main{
flex:1;
padding:5px;
overflow:auto;
background:#f4f4f4;
}

.search{
width:100%;
padding:10px;
font-size:16px;
margin-bottom:20px;
}

.question-grid{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.question-btn{
padding:10px;
 background:#2563eb; 
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

.question-btn:hover{
 background:#1d4ed8; 
}

.toolbar{
display:flex;
align-items:center;
flex-wrap:wrap;
gap:8px;
margin-bottom:20px;
}

.toolbar button{
padding:10px;
cursor:pointer;
}

.clear-search-btn{
background:#6b7280;
color:white;
border:none;
border-radius:5px;
}

.clear-search-btn:hover{
background:#4b5563;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
}

.modal-content{
background:white;
width:70%;
margin:5% auto;
padding:0;
border-radius:12px;
max-height:80vh;
overflow:hidden;
position:fixed;
left:50%;
top:50%;
transform:translate(-50%, -50%);
z-index:10;
border:2px solid #d1d5db;
box-shadow:0 10px 30px rgba(0,0,0,.2);
display:flex;
flex-direction:column;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
padding:5px 0px;
margin-bottom:0;
background:#eff6ff;
border-bottom:1px solid #bfdbfe;
border-radius:12px 12px 0 0;
flex-shrink:0;
}

.drag-handle{
display:flex;
align-items:center;
gap:8px;
flex:1;
cursor:grab;
user-select:none;
}

.drag-icon{
font-size:16px;
line-height:1;
opacity:0.7;
}

.modal-header h2{
font-size:20px;
color:#1e3a8a;
margin:0;
}

.close{
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:22px;
line-height:1;
width:36px;
height:36px;
border-radius:50%;
background:#111827;
color:white;
border:1px solid #111827;
}

.close:hover{
background:#374151;
}

.dark .modal-content{
background:#1f2937;
color:white;
border-color:#4b5563;
}

.dark .modal-header{
background:#374151;
border-color:#4b5563;
}

.dark .modal-header h2{
color:#f9fafb;
}

.header-actions{
display:flex;
align-items:center;
gap:8px;
margin-left:auto;
}

.favorite{
cursor:pointer;
font-size:20px;
}

.copy-question{
cursor:pointer;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:4px;
padding:4px 8px;
}

.copy-question:hover{
background:#1d4ed8;
}

.copy-status{
font-size:12px;
color:#166534;
margin-left:4px;
min-width:56px;
}

#answer{
padding:16px 20px 20px;
overflow:auto;
flex:1;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="sidebar-header">
<h2 class="sidebar-title">Topics</h2>
<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle topics">☰</button>
</div>

<div class="topic active" data-topic="csharp" onclick="selectTopic('csharp')">C#</div>

<div class="topic" data-topic="core" onclick="selectTopic('core')">.NET Core</div>

<div class="topic" data-topic="sql" onclick="selectTopic('sql')">SQL</div>

<div class="topic" data-topic="angular" onclick="selectTopic('angular')">Angular</div>

<div class="topic" data-topic="solid" onclick="selectTopic('solid')">SOLID/DESIGN PATTERNS</div>

<div class="topic" data-topic="microservices" onclick="selectTopic('microservices')">Microservices</div>

<div class="topic" data-topic="azure" onclick="selectTopic('azure')">Azure</div>
<div class="topic" data-topic="WEBAPI" onclick="selectTopic('WEBAPI')">WEB API</div>
<div class="topic" data-topic="ENTITYFRAMEWORK" onclick="selectTopic('ENTITYFRAMEWORK')">Entity Framework</div>

<div class="topic" data-topic="LINQ" onclick="selectTopic('LINQ')">LINQ</div>
<div class="topic" data-topic="SCENARIO" onclick="selectTopic('SCENARIO')">SCENARIO</div>
<div class="topic" onclick="showFavorites()">⭐ Favorites</div>

</div>

<div class="main">
<div class="toolbar">
<!-- <button onclick="toggleDarkMode()"> Dark Mode </button> -->
<button onclick="randomQuestion()"> Interview Mode</button>
<button class="clear-search-btn" onclick="clearSearch()" type="button">Clear Search</button>
<!-- <a href="manage-data.html" target="_blank" style="text-decoration:none;">
<button type="button">Manage Data</button>
</a> -->
</div>
<!-- Start Search Questions: -->
<input id="search" class="search" placeholder="Search Question" onkeyup="searchQuestion()">
<!-- End Search Questions: -->

<div id="questions" class="question-grid"></div> </div>

<div id="popup" class="modal">
<div id="modalContent" class="modal-content">
<div id="modalHeader" class="modal-header">
<div id="dragHandle" class="drag-handle">
<span class="drag-icon">⋮⋮</span>
<h2 id="title"></h2>
</div>
<div class="header-actions">
<span id="copyStatus" class="copy-status"></span>
<button class="copy-question" style="background-color:none;background:none;" onclick="copyCurrentQuestion()" title="Copy question">📋</button>
<span class="favorite" onclick="addFavorite(currentTopic, currentQuestion)" tooltip="Add to Favorate">⭐</span>
<span class="close" onclick="closePopup()"> × </span>
</div>
</div>

<div id="answer"></div>

</div>

</div>

<script src="data.js"></script>
<script src="csharp-data.js"></script>
<script src="core-data.js"></script>
<script src="sql-data.js"></script>
<script src="angular-data.js"></script>
<script src="solid-data.js"></script>
<script src="microservices-data.js"></script>
<script src="azure-data.js"></script>
<script src="webapi-data.js"></script>
<script src="linq-data.js"></script>
<script src="scenario-data.js"></script>
<script src="entity-data.js"></script>

<script>

let currentTopic="";
let currentQuestion="";
let favorites=[];
let isDragging=false;
let dragOffsetX=0;
let dragOffsetY=0;

function centerModal(){
const modalContent=
 document.getElementById("modalContent");
modalContent.style.left="50%";
modalContent.style.top="50%";
modalContent.style.transform="translate(-50%, -50%)";
modalContent.style.margin="0";
}

function startDrag(e){
if(e.target.closest('.close')) return;
if(!e.target.closest('#dragHandle')) return;

e.preventDefault();
e.stopPropagation();

const modalContent=
 document.getElementById("modalContent");
isDragging=true;
const rect=modalContent.getBoundingClientRect();
dragOffsetX=e.clientX-rect.left;
dragOffsetY=e.clientY-rect.top;
modalContent.style.transform="none";
}

function onDrag(e){
if(!isDragging) return;
const modalContent=
 document.getElementById("modalContent");
let x=e.clientX-dragOffsetX;
let y=e.clientY-dragOffsetY;

const maxX=window.innerWidth-modalContent.offsetWidth;
const maxY=window.innerHeight-modalContent.offsetHeight;

x=Math.max(10, Math.min(x, maxX-10));
y=Math.max(10, Math.min(y, maxY-10));

modalContent.style.left=x+"px";
modalContent.style.top=y+"px";
}

function stopDrag(){
isDragging=false;
}

function stopPopupPropagation(e){
e.stopPropagation();
}

function setActiveTopic(topic){
const items=document.querySelectorAll('.topic');
items.forEach(item=>{
const matches=item.getAttribute('data-topic')===topic;
item.classList.toggle('active', matches);
});
}

function toggleSidebar(){
document.body.classList.toggle('sidebar-collapsed');
}

function collapseSidebar(){
document.body.classList.add('sidebar-collapsed');
}

function selectTopic(topic){
clearSearchInput();
loadTopic(topic);
}

function loadTopic(topic){

currentTopic=topic;
setActiveTopic(topic);

let html="";

for(let q in data[topic]){

html+=`
<button class='question-btn'
onclick="showQuestion('${topic}','${q}')">

${q}

</button>
`;
}

document.getElementById("questions").innerHTML=html;
}

function showQuestion(topic,q){
currentTopic = topic;
currentQuestion = q;

document.getElementById("title").textContent = q;
document.getElementById("answer").innerHTML = data[topic][q].answer;

document.getElementById("popup").style.display = "block";
centerModal();
}

function copyCurrentQuestion(){
if(!currentQuestion){
  return;
}

navigator.clipboard.writeText(currentQuestion).then(() => {
  const status = document.getElementById('copyStatus');
  status.textContent = 'Copied';
  clearTimeout(window.copyStatusTimer);
  window.copyStatusTimer = setTimeout(() => {
    status.textContent = '';
  }, 1200);
}).catch(() => {
  const status = document.getElementById('copyStatus');
  status.textContent = 'Failed';
  clearTimeout(window.copyStatusTimer);
  window.copyStatusTimer = setTimeout(() => {
    status.textContent = '';
  }, 1200);
});
}

function closePopup(){
centerModal();

document.getElementById("popup").style.display=
"none";
}

function searchQuestion(){

let text=
document.getElementById("search")
.value
.toLowerCase();

let html="";

for(let topic in data){

for(let q in data[topic]){

if(q.toLowerCase().includes(text)){

html+=`
<button class='question-btn'
onclick="showQuestion('${topic}','${q}')">

${q}

</button>`;
}
}
}

document.getElementById("questions").innerHTML=
html;
}

function clearSearchInput(){
const searchBox=document.getElementById("search");
if(searchBox){
  searchBox.value="";
}
}

function clearSearch(){
clearSearchInput();

if(currentTopic){
  loadTopic(currentTopic);
} else {
  loadTopic('csharp');
}
}

function toggleDarkMode(){

document.body.classList.toggle("dark");
}

function addFavorite(topic,q){

favorites.push({
topic:topic,
question:q
});

alert("Added to Favorites");
}

function showFavorites(){

let html="";

favorites.forEach(f=>{

html+=`
<button class='question-btn'
onclick="showQuestion('${f.topic}','${f.question}')">

${f.question}

</button>`;
});

document.getElementById("questions").innerHTML=
html;
}

function randomQuestion(){

let all=[];

for(let t in data){

for(let q in data[t]){

all.push({
topic:t,
question:q
});
}
}

let rnd=
all[Math.floor(Math.random()*all.length)];

showQuestion(
rnd.topic,
rnd.question
);
}

const popup = document.getElementById("popup");
popup.addEventListener("click", function(e){
  if(e.target === popup){
    closePopup();
  }
});

document.getElementById("dragHandle").addEventListener("mousedown", startDrag);
document.getElementById("modalHeader").addEventListener("mousedown", stopPopupPropagation);
document.getElementById("modalHeader").addEventListener("click", stopPopupPropagation);
document.getElementById("modalContent").addEventListener("mousedown", stopPopupPropagation);
document.getElementById("modalContent").addEventListener("click", stopPopupPropagation);
document.addEventListener("mousemove", onDrag);
document.addEventListener("mouseup", stopDrag);

loadTopic('csharp');

</script>

</body>
</html>
